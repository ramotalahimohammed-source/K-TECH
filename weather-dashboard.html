<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        #weather {
            margin-top: 20px;
            text-align: center;
        }
        @media (min-width: 600px) {
            #weather {
                display: flex;
                justify-content: space-around;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Weather Dashboard</h1>
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button id="searchButton">Search</button>
</header>

<main id="weather"></main>

<script>
    document.getElementById('searchButton').addEventListener('click', function() {
        const city = document.getElementById('cityInput').value;
        const apiKey = 'YOUR_API_KEY'; // Replace with your OpenWeatherMap API Key
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
            .then(response => response.json())
            .then(data => {
                if (data.cod === 200) {
                    const weatherHTML = `
                        <h2>Current Weather in ${data.name}</h2>
                        <p>Temperature: ${data.main.temp} °C</p>
                        <p>Humidity: ${data.main.humidity} %</p>
                        <p>Wind Speed: ${data.wind.speed} m/s</p>
                    `;
                    document.getElementById('weather').innerHTML = weatherHTML;
                    fetchForecast(data.coord.lat, data.coord.lon, apiKey);
                } else {
                    alert('City not found!');
                }
            });
    });

    function fetchForecast(lat, lon, apiKey) {
        fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`)
            .then(response => response.json())
            .then(data => {
                let forecastHTML = '<h3>5-Day Forecast:</h3><ul>';
                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    if (date.getHours() === 12) { // Show only one forecast per day
                        forecastHTML += `
                            <li>${date.toLocaleDateString()}: ${item.main.temp} °C, ${item.weather[0].description}</li>
                        `;
                    }
                });
                forecastHTML += '</ul>';
                document.getElementById('weather').innerHTML += forecastHTML;
            });
    }
</script>

</body>
</html>
